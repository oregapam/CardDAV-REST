services:
  baikal:
    image: ghcr.io/aalmenar/baikal:nginx
    restart: unless-stopped
    ports:
      - "8800:80"
    volumes:
      - baikal-config:/var/www/baikal/config
      - baikal-data:/var/www/baikal/Specific
    networks:
      - dav
    healthcheck:
      test: ["CMD", "curl", "-fsL", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  carddav-rest:
    image: ${ADAPTER_IMAGE:-carddav-rest:latest}
    restart: unless-stopped
    depends_on:
      baikal:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      BAIKAL_URL: http://baikal/dav.php
      BAIKAL_USER: ${BAIKAL_USER}
      BAIKAL_PASS: ${BAIKAL_PASS}
      API_KEY: ${API_KEY}
      NAME_FORMAT: ${NAME_FORMAT:-western}
    networks:
      - dav
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dav:

volumes:
  baikal-config:
  baikal-data:
